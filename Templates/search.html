<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../Style/SStyle.css">
    <title>Groupie Tracker</title>
</head>

<body>
    <div class="main"></div>
    <datalist id="Search">
        <option value="hello">
    </datalist>
    <header>
        Groupie Tracker
    </header>
    <div id="searchBar">
        <form method="POST" action="/search">
            <datalist id="suggestionsList">
                {{range .Artists}}
                <option value="{{.Name}} -artist/band">
                {{range .Members}}
                <option value="{{.}} -Member">
                {{end}}
                {{end}}
                {{range .SearchLocations}}
                <option value="{{.}} -Location">
                {{end}}
                {{range .SearchFirstAlbum}}
                <option value="{{.}} -First Album">
                {{end}}
                {{range .SearchCreationDate}}
                <option value="{{.}} -Creation Date">
                {{end}}
            </datalist>
            <input type="text" id="theArtist" name="theArtist" list="suggestionsList" placeholder="Search..." required>
            <button type="submit" class="search-button">
                <i class="fa fa-search fa-xl search-icon"></i> Search
            </button>            
        </form>
    </div>

    <label class="checkbox" onclick="toggleCheckbox()" >
        <button style="font-size:24px; color: white;background-color: transparent; border: none;">Filter <i class="fa fa-sliders"></i></button>
    </label>

    <form action="/filtered" method="POST" class="filters" id="filters" >
        <h3>Filter Options</h3>
        <div class="NumMembers">
            Number of Members:
            <br>
            {{range .NumberOfMember}}
            <label for="NumMembers{{.}}">
                <input type="checkbox" name="NumMembers" id="NumMembers{{.}}" value="{{.}}">
                {{.}}
            </label>
            {{end}}
        </div>
        <br>
        <div class="creation-date">
            <label for="MinCreationDate">Minimum Creation Year:</label>
            <input type="range" name="MinCreationDate" id="MinCreationDate" min="1950" max="2024" value="1950">
            <span id="MinRangeValueC">1950</span>
            <label for="MaxCreationDate">Maximum Creation Year:</label>
            <input type="range" name="MaxCreationDate" id="MaxCreationDate" min="1950" max="2024" value="2024">
            <span id="MaxRangeValueC">2024</span>

        </div>

        <div class="first-album">
            <label for="MinFirstAlbum">Minimum First Album Year:</label>
            <input type="range" name="MinFirstAlbum" id="MinFirstAlbum" min="1950" max="2024" value="1950">
            <span id="MinRangeValueF">1950</span>
            <label for="MaxFirstAlbum">Maximum First Album Year:</label>
            <input type="range" name="MaxFirstAlbum" id="MaxFirstAlbum" min="1950" max="2024" value="2024">
            <span id="MaxRangeValueF">2024</span>
        </div>

        <div class="locations">
            <label for="locations">Locations:</label>
            <select name="locations" id="locations">
                <option value=""></option>
                {{range .SearchLocations}}
                <option value="{{.}}">{{.}}</option>
                {{end}}
            </select>
        </div>
        <input type="submit" value="Filter">
    </form>

    <main>
        <section class="container">
            {{range .Artists}}
            <div class="card">
                <div class="card-image" loading="lazy" style="background-image: url('{{.Image}}'); background-size: cover;"></div>
                <h2>{{.Name}}</h2>
                <a href="/view?id={{.ID}}">View</a>
            </div>
            {{else}}
            <p class="no-results">No results found!</p>
            {{end}}
        </section>    
    </main>
    <script>
        function toggleCheckbox() {
            const filters = document.getElementById('filters');
            filters.classList.toggle('active');
        }

        function updateRangeValue() {
            var minCreationDate = document.getElementById("MinCreationDate");
            var minCreationDateValue = document.getElementById("MinRangeValueC");
            var maxCreationDate = document.getElementById("MaxCreationDate");
            var maxCreationDateValue = document.getElementById("MaxRangeValueC");

            var minFirstAlbum = document.getElementById("MinFirstAlbum");
            var minFirstAlbumValue = document.getElementById("MinRangeValueF");
            var maxFirstAlbum = document.getElementById("MaxFirstAlbum");
            var maxFirstAlbumValue = document.getElementById("MaxRangeValueF");

            minCreationDateValue.textContent = minCreationDate.value;
            maxCreationDateValue.textContent = maxCreationDate.value;
            minFirstAlbumValue.textContent = minFirstAlbum.value;
            maxFirstAlbumValue.textContent = maxFirstAlbum.value;
        }

        document.getElementById("MinCreationDate").addEventListener("input", updateRangeValue);
        document.getElementById("MaxCreationDate").addEventListener("input", updateRangeValue);
        document.getElementById("MinFirstAlbum").addEventListener("input", updateRangeValue);
        document.getElementById("MaxFirstAlbum").addEventListener("input", updateRangeValue);
    </script>
    <button id="BackButton" onclick="window.location.href = 'http://localhost:1221/artists'">Go to Artists</button>
    <footer>Thank you</footer>
</body>
</html>
